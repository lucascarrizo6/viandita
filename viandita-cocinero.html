<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1C0D05">
<title>Viandita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
button,input{font-family:inherit;font-size:100%;-webkit-appearance:none;appearance:none}
:root{
  --bg:#FFF8F0;--surface:#fff;
  --p:#D4552A;--p-lt:#FAF0EA;--p-dk:#B8431A;
  --hero:#1C0D05;--hero2:#2D1508;
  --tx:#2D1B0E;--tx2:#7A5C46;--tx3:#B39480;
  --bd:#EDE0D4;--green:#4A7C3A;--green-bg:#EBF4E6;
  --amber:#A06B10;--amber-bg:#FEF3DC;
  --fd:'Fraunces',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --touch:48px;
  --xs:13px;--sm:14px;--base:15px;--lg:18px;--xl:22px;
  --pad:20px;
}

/* ── BODY (mobile-first) ─────────────────────────────────────────── */
body{
  font-family:var(--fb);background:var(--bg);color:var(--tx);
  max-width:500px;margin:0 auto;min-height:100dvh;
  padding-bottom:calc(96px + var(--sab));
  overflow-x:hidden;-webkit-font-smoothing:antialiased
}

/* ── PAGE WRAPPER ────────────────────────────────────────────────── */
.page-wrap{display:block}

/* ── SIDEBAR (mobile = just block, desktop = sticky left col) ────── */
.sidebar{display:block}

/* ── HERO ────────────────────────────────────────────────────────── */
.hero{
  background:linear-gradient(160deg,var(--hero) 0%,var(--hero2) 100%);
  padding:calc(var(--sat) + 24px) var(--pad) 28px;
  position:relative;overflow:hidden
}
.hero-pattern{
  position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(212,85,42,.15) 1px,transparent 1px);
  background-size:22px 22px
}
.hero-glow{
  position:absolute;top:-80px;right:-80px;width:240px;height:240px;
  background:radial-gradient(circle,rgba(212,85,42,.22) 0%,transparent 68%);pointer-events:none
}
.hero-glow2{
  position:absolute;bottom:-60px;left:-40px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(212,85,42,.1) 0%,transparent 70%);pointer-events:none
}
.hero-topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;position:relative;z-index:2
}
.hero-logo{font-family:var(--fd);font-style:italic;font-size:var(--sm);color:rgba(255,255,255,.4);letter-spacing:.5px}
.hero-pill{
  background:rgba(212,85,42,.18);border:1px solid rgba(212,85,42,.3);
  padding:5px 13px;border-radius:20px;font-size:var(--xs);color:rgba(255,255,255,.7);font-weight:500
}
.av{
  width:84px;height:84px;border-radius:50%;background:var(--p);color:#fff;
  font-family:var(--fd);font-size:30px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:3px solid rgba(255,255,255,.12);margin-bottom:16px;
  position:relative;z-index:2;box-shadow:0 10px 28px rgba(0,0,0,.4)
}
.hero-name{
  font-family:var(--fd);font-size:clamp(28px,8vw,40px);font-weight:700;
  color:#fff;line-height:1.05;margin-bottom:5px;position:relative;z-index:2
}
.hero-sp{font-size:var(--sm);color:var(--p);font-weight:600;margin-bottom:16px;position:relative;z-index:2}
.hero-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;position:relative;z-index:2}
.chip{
  font-size:var(--xs);padding:6px 12px;border-radius:20px;
  border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.68);background:rgba(255,255,255,.07);
  display:flex;align-items:center;gap:5px
}
.hero-bio{font-size:var(--sm);color:rgba(255,255,255,.48);line-height:1.65;position:relative;z-index:2}

/* ── STATUS BANNER ───────────────────────────────────────────────── */
.status-banner{margin:16px var(--pad) 0;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px}
.status-banner.confirmed{background:var(--green-bg);border:1px solid #C3DDB8}
.status-banner.open{background:var(--amber-bg);border:1px solid #F5D78A}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.confirmed .status-dot{background:var(--green);animation:pulse 2.5s infinite}
.open .status-dot{background:var(--amber);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.status-txt{font-size:var(--xs);line-height:1.45}
.confirmed .status-txt{color:var(--green)}
.open .status-txt{color:var(--amber)}
.status-txt strong{font-weight:600}

/* ── COUNTDOWN (desktop sidebar, hidden on mobile) ───────────────── */
.countdown-box{display:none}
.sidebar-powered{display:none}

/* ── WEEK NAV ────────────────────────────────────────────────────── */
.week-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px var(--pad) 10px
}
.week-label{font-size:var(--xs);font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--tx3)}
.week-range{font-size:var(--xs);color:var(--tx3)}

/* ── DAY TABS ────────────────────────────────────────────────────── */
.day-tabs{display:flex;gap:8px;padding:0 var(--pad) 4px;overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 16px;border-radius:14px;border:1.5px solid var(--bd);
  background:var(--surface);cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);min-width:58px
}
.day-tab.on{background:var(--p);border-color:var(--p);box-shadow:0 4px 14px rgba(212,85,42,.32)}
.day-tab.today{border-color:var(--p)}
.day-tab-name{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3)}
.day-tab.on .day-tab-name{color:rgba(255,255,255,.8)}
.day-tab.today:not(.on) .day-tab-name{color:var(--p)}
.day-tab-num{font-size:var(--base);font-weight:700;color:var(--tx)}
.day-tab.on .day-tab-num{color:#fff}
.day-tab.today:not(.on) .day-tab-num{color:var(--p)}

/* ── MAIN TABS ───────────────────────────────────────────────────── */
.tabs{
  display:flex;border-bottom:1px solid var(--bd);
  padding:0 var(--pad);background:var(--surface);
  position:sticky;top:0;z-index:50;margin-top:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.05)
}
.tab{
  padding:16px 0;margin-right:28px;font-size:var(--sm);font-weight:600;
  color:var(--tx3);cursor:pointer;border-bottom:2.5px solid transparent;
  margin-bottom:-1px;transition:color .15s,border-color .15s;
  min-height:var(--touch);display:flex;align-items:center
}
.tab.on{color:var(--p);border-bottom-color:var(--p)}
.pane{display:none;padding:20px var(--pad)}
.pane.on{display:block}

/* ── DISH CARD (mobile single) ───────────────────────────────────── */
.dish-card{
  background:var(--surface);border-radius:22px;overflow:hidden;
  box-shadow:0 6px 24px rgba(45,27,14,.09),0 1px 4px rgba(45,27,14,.05)
}
.dish-top{display:flex;flex-direction:column}
.dish-icon{
  width:100%;height:clamp(120px,32vw,160px);
  background:linear-gradient(135deg,#FDE8D8 0%,#F5CEAE 60%,#ECC09A 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(54px,14vw,72px);position:relative;flex-shrink:0
}
.dish-icon::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 55%,rgba(255,255,255,.2) 100%)
}
.dish-info{flex:1;min-width:0;padding:18px 20px 0}
.dish-nm{font-family:var(--fd);font-size:var(--xl);font-weight:600;margin-bottom:5px;line-height:1.15}
.dish-price{font-size:clamp(22px,5.5vw,28px);font-weight:700;color:var(--p);font-family:var(--fd)}
.acomp-block{background:var(--bg);border-radius:13px;padding:13px 16px;margin:14px 20px 0}
.acomp-label{
  font-size:var(--xs);font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--tx3);margin-bottom:5px;display:flex;align-items:center;gap:6px
}
.lock-icon{font-size:11px}
.acomp-val{font-size:var(--sm);color:var(--tx2);line-height:1.5}
.add-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 20px}
.add-note{font-size:var(--xs);color:var(--tx3);font-weight:500;background:var(--bg);padding:5px 10px;border-radius:8px}
.qty-row{display:flex;align-items:center;gap:12px}
.qb{
  width:var(--touch);height:var(--touch);border-radius:50%;
  border:1.5px solid var(--bd);background:var(--surface);font-size:20px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx);transition:all .15s
}
.qb.add{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 4px 14px rgba(212,85,42,.38)}
.qn{font-size:var(--base);font-weight:700;min-width:24px;text-align:center}

/* ── DESKTOP DISH GRID CARD ──────────────────────────────────────── */
.dk-card .dish-icon{height:90px;font-size:42px}
.dk-body{padding:12px 14px 14px}
.dk-day{
  display:inline-flex;align-items:center;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;color:var(--p);
  background:var(--p-lt);padding:3px 9px;border-radius:6px;margin-bottom:6px
}
.dk-card .dish-nm{font-size:15px;font-family:var(--fd);font-weight:600;margin-bottom:3px;line-height:1.2}
.dk-card .dish-price{font-size:18px;font-weight:700;color:var(--p);font-family:var(--fd)}
.dk-acomp{font-size:12px;color:var(--tx3);margin-top:5px;line-height:1.4;min-height:32px}
.dk-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:10px}
.dk-actions .qb{width:36px;height:36px;font-size:17px}
.dk-actions .qn{font-size:14px;font-weight:700;min-width:20px;text-align:center}

/* ── PLAN CARDS ──────────────────────────────────────────────────── */
.plan-card{
  background:var(--surface);border:1.5px solid var(--bd);border-radius:20px;
  padding:20px;margin-bottom:14px;position:relative;box-shadow:0 2px 12px rgba(45,27,14,.05)
}
.plan-card.pop{border-color:var(--p);box-shadow:0 6px 22px rgba(212,85,42,.13)}
.plan-badge{
  position:absolute;top:-12px;left:18px;
  background:var(--p);color:#fff;font-size:var(--xs);font-weight:700;
  padding:4px 14px;border-radius:20px;box-shadow:0 4px 12px rgba(212,85,42,.32)
}
.plan-nm{font-weight:700;font-size:var(--base);margin-bottom:4px}
.plan-desc{font-size:var(--sm);color:var(--tx2);margin-bottom:14px;line-height:1.5}
.plan-pr-row{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.plan-pr{font-family:var(--fd);font-size:var(--xl);font-weight:600}
.plan-save{font-size:var(--xs);color:var(--green);font-weight:600;background:var(--green-bg);padding:4px 10px;border-radius:20px}
.plan-btn{
  width:100%;padding:15px;background:var(--p-lt);color:var(--p);border:none;
  border-radius:13px;font-family:var(--fb);font-size:var(--sm);font-weight:700;
  cursor:pointer;min-height:var(--touch);transition:all .15s
}
.plan-card.pop .plan-btn{background:var(--p);color:#fff;box-shadow:0 4px 14px rgba(212,85,42,.32)}

/* ── FAB CARRITO (mobile) ────────────────────────────────────────── */
.bottom-bar{
  position:fixed;bottom:calc(18px + var(--sab));left:50%;transform:translateX(-50%);
  width:calc(100% - 40px);max-width:440px;
  background:var(--p);color:#fff;border-radius:20px;padding:14px 20px;
  display:flex;align-items:center;gap:14px;z-index:200;cursor:pointer;border:none;
  box-shadow:0 10px 32px rgba(212,85,42,.48),0 2px 8px rgba(0,0,0,.18);
  transition:opacity .25s cubic-bezier(.4,0,.2,1)
}
.bt-icon{font-size:22px;flex-shrink:0}
.bt-lbl{font-size:var(--xs);opacity:.78;line-height:1;margin-bottom:2px}
.bt-amt{font-family:var(--fd);font-size:var(--base);font-weight:600;line-height:1.15}
.bt-btn{
  margin-left:auto;background:rgba(255,255,255,.22);color:#fff;border:none;
  border-radius:11px;padding:8px 16px;font-family:var(--fb);font-size:var(--xs);
  font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0
}
@keyframes fabBounce{
  0%{transform:translateX(-50%) scale(1)}35%{transform:translateX(-50%) scale(1.06)}
  65%{transform:translateX(-50%) scale(.97)}100%{transform:translateX(-50%) scale(1)}
}
.bottom-bar.bounce{animation:fabBounce .38s cubic-bezier(.4,0,.2,1)}

/* ── OVERLAY + CART SHEET (mobile) ──────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(28,13,5,.62);z-index:300;
  display:none;align-items:flex-end;
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)
}
.overlay.open{display:flex}
.cart-sheet{
  background:var(--bg);border-radius:24px 24px 0 0;
  width:100%;max-width:500px;margin:0 auto;
  max-height:88dvh;display:flex;flex-direction:column;padding-bottom:var(--sab)
}
.sheet-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px var(--pad) 14px;border-bottom:1px solid var(--bd);flex-shrink:0
}
.sheet-hdr h3{font-family:var(--fd);font-size:var(--lg);font-weight:600}
.close-btn{
  width:var(--touch);height:var(--touch);border-radius:50%;border:1px solid var(--bd);
  background:none;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--tx2)
}
.sheet-scroll{overflow-y:auto;padding:0 var(--pad);flex:1;-webkit-overflow-scrolling:touch}

/* ── CART ITEMS (shared mobile + desktop) ────────────────────────── */
.c-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--bd)}
.c-info{flex:1;min-width:0}
.c-nm{font-weight:600;font-size:var(--sm)}
.c-sub{font-size:var(--xs);color:var(--tx2);margin-top:2px}
.c-pr{font-weight:700;font-size:var(--sm);white-space:nowrap;color:var(--p)}
.rm{
  width:var(--touch);height:var(--touch);border-radius:50%;border:1px solid var(--bd);
  background:none;color:var(--tx3);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.sum-row{display:flex;justify-content:space-between;font-size:var(--sm);padding:8px 0;color:var(--tx2)}
.sum-row.total{color:var(--tx);font-weight:700;font-size:var(--base);border-top:1px solid var(--bd);margin-top:6px;padding-top:14px}
.sheet-foot{padding:16px var(--pad) 20px;border-top:1px solid var(--bd);flex-shrink:0}
.wa-btn{
  width:100%;background:#25D366;color:#fff;border:none;border-radius:14px;padding:16px;
  font-family:var(--fb);font-size:var(--base);font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  min-height:var(--touch);margin-top:16px;box-shadow:0 4px 16px rgba(37,211,102,.3)
}
.empty{text-align:center;padding:48px 20px;color:var(--tx3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-ttl{font-size:var(--base);font-weight:600;margin-bottom:4px;color:var(--tx2)}
.empty-sub{font-size:var(--xs)}

/* ── CART PANEL (desktop, hidden on mobile) ──────────────────────── */
.cart-panel{display:none}

/* ── POWERED / FOOTER ────────────────────────────────────────────── */
.powered{text-align:center;padding:20px 0 10px;font-size:var(--xs);color:var(--tx3)}
.powered span{font-family:var(--fd);font-style:italic;color:var(--p)}

/* ── PAGE LOADER ─────────────────────────────────────────────────── */
.page-loader{
  position:fixed;inset:0;background:var(--hero);
  display:flex;align-items:center;justify-content:center;z-index:500;transition:opacity .4s
}
.page-loader.done{opacity:0;pointer-events:none}
.loader-logo{
  font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:30px;color:var(--p);
  animation:logoPulse 1.3s ease-in-out infinite
}
@keyframes logoPulse{0%,100%{opacity:.35}50%{opacity:1}}


/* ══════════════════════════════════════════════════════════════════
   DESKTOP — 768px+
══════════════════════════════════════════════════════════════════ */
@media (min-width:768px){

  /* BODY */
  body{
    max-width:1200px;margin:0 auto;padding-bottom:0;
    background:#F5ECE3; /* slightly darker bg outside page */
  }

  /* PAGE WRAPPER: 3-column flex */
  .page-wrap{
    display:flex;min-height:100dvh;align-items:flex-start;
    background:var(--bg);
    box-shadow:0 0 60px rgba(0,0,0,.12)
  }

  /* ── LEFT SIDEBAR ── */
  .sidebar{
    width:340px;flex-shrink:0;
    position:sticky;top:0;height:100dvh;overflow-y:auto;
    background:var(--hero2);
    display:flex;flex-direction:column;
  }

  /* Hero adjustments inside sidebar */
  .hero{padding:32px 24px 24px;flex-shrink:0}
  .hero-topbar{margin-bottom:20px}
  .av{width:72px;height:72px;font-size:24px;margin-bottom:14px}
  .hero-name{font-size:26px}
  .hero-sp{font-size:13px;margin-bottom:12px}
  .hero-chips{margin-bottom:10px;gap:6px}
  .chip{font-size:12px;padding:5px 10px}
  .hero-bio{font-size:13px}

  /* Status banner in sidebar */
  #desk-status-wrap .status-banner{margin:0 !important;border-radius:0;border-left:0;border-right:0}

  /* Countdown box */
  .countdown-box{
    display:block;padding:20px 24px;
    border-top:1px solid rgba(255,255,255,.07)
  }
  .cd-label{
    font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;
    color:rgba(255,255,255,.38);margin-bottom:6px
  }
  .cd-val{
    font-family:var(--fd);font-size:30px;font-weight:700;color:#fff;
    line-height:1;margin-bottom:4px;letter-spacing:-1px
  }
  .cd-sub{font-size:11px;color:rgba(255,255,255,.32)}

  /* Sidebar spacer + powered */
  .sidebar-spacer{flex:1}
  .sidebar-powered{
    display:block;padding:16px 24px;
    border-top:1px solid rgba(255,255,255,.06);
    font-size:11px;color:rgba(255,255,255,.25);text-align:center
  }
  .sidebar-powered span{font-family:var(--fd);font-style:italic;color:rgba(212,85,42,.6)}

  /* ── MAIN COLUMN ── */
  .main-col{flex:1;min-width:0;background:var(--bg);display:flex;flex-direction:column}

  /* Hide mobile-only in main col */
  #status-banner-wrap,.week-nav,.day-tabs,.powered{display:none}

  /* Tabs: no sticky top offset needed, use 0 */
  .tabs{margin-top:0;position:sticky;top:0;z-index:50}

  /* Pane: more padding */
  .pane{padding:24px 24px}

  /* Dish GRID: 2 columns */
  #dish-view{
    display:grid;grid-template-columns:1fr 1fr;gap:16px
  }

  /* ── RIGHT CART PANEL ── */
  .cart-panel{
    display:flex;flex-direction:column;
    width:320px;flex-shrink:0;
    position:sticky;top:0;height:100dvh;overflow:hidden;
    background:var(--surface);border-left:1px solid var(--bd)
  }
  .cp-hdr{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 20px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;
    background:var(--surface)
  }
  .cp-hdr h3{font-family:var(--fd);font-size:var(--lg);font-weight:600}
  .cp-badge{
    background:var(--p);color:#fff;font-size:11px;font-weight:700;
    padding:3px 10px;border-radius:20px
  }
  .cp-scroll{flex:1;overflow-y:auto;padding:0 20px;-webkit-overflow-scrolling:touch}
  .cp-foot{
    padding:16px 20px 20px;border-top:1px solid var(--bd);flex-shrink:0;background:var(--surface)
  }

  /* Hide mobile FAB + overlay on desktop */
  .bottom-bar{display:none !important}
  .overlay{display:none !important}

  /* Desk-only status wrap padding */
  #desk-status-wrap{flex-shrink:0}
}

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
</head>
<body>

<div id="page-loader" class="page-loader">
  <div class="loader-logo">viandita</div>
</div>

<div class="page-wrap">

  <!-- ── SIDEBAR (left on desktop, full-width on mobile) ── -->
  <aside class="sidebar">
    <div class="hero">
      <div class="hero-pattern"></div>
      <div class="hero-glow"></div>
      <div class="hero-glow2"></div>
      <div class="hero-topbar">
        <div class="hero-logo">viandita</div>
        <div class="hero-pill">Menú semanal</div>
      </div>
      <div class="av" id="av"></div>
      <div class="hero-name" id="cook-nm"></div>
      <div class="hero-sp" id="cook-sp"></div>
      <div class="hero-chips" id="cook-chips"></div>
      <p class="hero-bio" id="cook-bio"></p>
    </div>

    <!-- Desktop: status banner in sidebar -->
    <div id="desk-status-wrap"></div>

    <!-- Desktop: countdown -->
    <div class="countdown-box">
      <div class="cd-label">Cierre de pedidos</div>
      <div class="cd-val" id="countdown-val">—</div>
      <div class="cd-sub">próximo domingo 23:59</div>
    </div>

    <div class="sidebar-spacer"></div>
    <div class="sidebar-powered">con <span>viandita</span></div>
  </aside>

  <!-- ── MAIN COLUMN ── -->
  <div class="main-col">

    <!-- Mobile: status banner -->
    <div id="status-banner-wrap"></div>

    <!-- Mobile: week nav + day tabs -->
    <div class="week-nav">
      <span class="week-label">Menú semanal</span>
      <span class="week-range" id="week-range"></span>
    </div>
    <div class="day-tabs" id="day-tabs"></div>

    <!-- Tabs: shared -->
    <div class="tabs">
      <div class="tab on" onclick="doTab('menu')">Plato del día</div>
      <div class="tab" onclick="doTab('planes')">Planes</div>
    </div>

    <div class="pane on" id="pane-menu"><div id="dish-view"></div></div>
    <div class="pane" id="pane-planes"><div id="plans-list"></div></div>

    <!-- Mobile: footer -->
    <div class="powered">con <span>viandita</span></div>
  </div>

  <!-- ── CART PANEL (desktop right sidebar) ── -->
  <div class="cart-panel">
    <div class="cp-hdr">
      <h3>Tu pedido 🛒</h3>
      <span class="cp-badge" id="desk-cart-badge" style="display:none">0</span>
    </div>
    <div class="cp-scroll" id="desk-c-items">
      <div class="empty">
        <div class="empty-icon">🍱</div>
        <div class="empty-ttl">Tu pedido está vacío</div>
        <div class="empty-sub">Agregá platos para comenzar</div>
      </div>
    </div>
    <div class="cp-foot" id="desk-c-foot"></div>
  </div>

</div><!-- /page-wrap -->

<!-- ── MOBILE FAB ── -->
<div id="bar" class="bottom-bar" style="opacity:0;pointer-events:none" onclick="openCart()">
  <div class="bt-icon">🛒</div>
  <div style="flex:1">
    <div class="bt-lbl">Tu pedido</div>
    <div class="bt-amt" id="bar-amt"></div>
  </div>
  <div class="bt-btn">Ver pedido →</div>
</div>

<!-- ── MOBILE OVERLAY CART ── -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="cart-sheet">
    <div class="sheet-hdr">
      <h3>Tu pedido</h3>
      <button class="close-btn" onclick="closeCart()">×</button>
    </div>
    <div class="sheet-scroll" id="c-items"></div>
    <div class="sheet-foot" id="c-foot"></div>
  </div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── ESTADO ────────────────────────────────────────────────────────
let COOK = null, cart = [], selDay = 0;
const f = n => '$' + n.toLocaleString('es-AR');
const tot = () => cart.reduce((s, i) => s + i.price * i.qty, 0);
const cnt = () => cart.reduce((s, i) => s + i.qty, 0);
const qof = id => { const x = cart.find(i => i.id == id); return x ? x.qty : 0; };
const isDesk = () => window.innerWidth >= 768;

// ── HELPERS DE FECHA ──────────────────────────────────────────────
function getMondayISO() {
  const now = new Date(), day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  const y = mon.getFullYear();
  const m = String(mon.getMonth() + 1).padStart(2, '0');
  const d = String(mon.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function getWeekDates() {
  const now = new Date(), day = now.getDay();
  const diffToMon = day === 0 ? -6 : (1 - day);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diffToMon);
  mon.setHours(0, 0, 0, 0);
  return Array.from({ length: 5 }, (_, i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i); return d;
  });
}

function isSundayOpen() { return new Date().getDay() === 0; }
function formatShortDate(d) { return d.getDate() + '/' + (d.getMonth() + 1); }

// ── COUNTDOWN ────────────────────────────────────────────────────
function startCountdown() {
  const el = document.getElementById('countdown-val');
  if (!el) return;
  function tick() {
    const now = new Date();
    const day = now.getDay();
    const daysToSun = day === 0 ? 0 : 7 - day;
    const target = new Date(now);
    target.setDate(now.getDate() + daysToSun);
    target.setHours(23, 59, 59, 0);
    const diff = target - now;
    if (diff <= 0) { el.textContent = 'Cerrado'; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.textContent = d > 0
      ? `${d}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m`
      : `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  tick(); setInterval(tick, 1000);
}

// ── ESTADOS ESPECIALES ────────────────────────────────────────────
function showNotFound() {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;font-family:'DM Sans',system-ui,sans-serif;flex-direction:column;gap:16px;color:#7A5C46;padding:32px;text-align:center">
      <div style="font-size:48px">🍱</div>
      <div style="font-family:'Fraunces',Georgia,serif;font-size:24px;font-weight:600;color:#2D1B0E">Cocinero no encontrado</div>
      <div style="font-size:14px">No existe ningún cocinero con ese link. Verificá la dirección.</div>
      <a href="viandita-landing.html" style="margin-top:8px;color:#D4552A;font-size:14px;font-weight:600">← Volver al inicio</a>
    </div>`;
}

function showNoMenu() {
  document.getElementById('day-tabs').innerHTML = '';
  document.getElementById('dish-view').innerHTML = `
    <div style="text-align:center;padding:56px 0;color:#B39480">
      <div style="font-size:42px;margin-bottom:14px">📋</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">Sin menú esta semana</div>
      <div style="font-size:13px">El cocinero aún no cargó el menú de la semana.</div>
    </div>`;
}

// ── CARGA DESDE SUPABASE ──────────────────────────────────────────
async function loadAndRender() {
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) { showNotFound(); return; }

  const { data: cocinero, error } = await db
    .from('cocineros').select('*')
    .eq('slug', slug).eq('activo', true).maybeSingle();

  if (error || !cocinero) { showNotFound(); return; }

  const monday = getMondayISO();

  const { data: semana } = await db
    .from('semanas').select('id, semana_inicio')
    .eq('cocinero_id', cocinero.id).eq('semana_inicio', monday).maybeSingle();

  let menu = [];
  if (semana) {
    const { data: platos } = await db
      .from('platos').select('*')
      .eq('semana_id', semana.id).eq('activo', true).order('orden');
    menu = (platos || []).map(p => ({
      id: p.id, day: p.dia, nm: p.nombre,
      acomp: p.acompanamiento, price: p.precio, icon: p.icono
    }));
  }

  const { data: planesRaw } = await db
    .from('planes').select('*')
    .eq('cocinero_id', cocinero.id).eq('activo', true).order('precio');

  COOK = {
    nm: cocinero.nombre, init: cocinero.iniciales,
    sp: cocinero.especialidad, bio: cocinero.bio || '',
    zone: cocinero.zona, days: 'Lun–Vie', phone: cocinero.telefono,
    rating: cocinero.rating, rev: cocinero.reviews || 0,
    menuCargado: semana ? semana.semana_inicio : monday,
    menu,
    plans: (planesRaw || []).map(p => ({
      id: p.id, nm: p.nombre, desc: p.descripcion,
      price: p.precio, saves: p.ahorro, pop: !!p.destacado
    }))
  };

  init();
  const loader = document.getElementById('page-loader');
  if (loader) { loader.classList.add('done'); setTimeout(() => loader.remove(), 400); }
}

// ── INIT ──────────────────────────────────────────────────────────
function init() {
  document.title = COOK.nm + ' · Viandita';
  document.getElementById('av').textContent = COOK.init;
  document.getElementById('cook-nm').textContent = COOK.nm;
  document.getElementById('cook-sp').textContent = COOK.sp;
  document.getElementById('cook-bio').textContent = COOK.bio;
  document.getElementById('cook-chips').innerHTML = [
    `<span class="chip">📍 ${COOK.zone}</span>`,
    `<span class="chip">📅 ${COOK.days}</span>`,
    `<span class="chip">★ ${COOK.rating} (${COOK.rev})</span>`,
  ].join('');

  renderStatusBanner();
  renderWeekNav();
  startCountdown();

  if (!COOK.menu.length) {
    showNoMenu();
  } else {
    const today = new Date().getDay();
    if (today >= 1 && today <= 5) selDay = today - 1;
    renderDayTabs();
    renderDish();
  }

  renderPlans();
  renderCart();
}

function renderStatusBanner() {
  const isOpen = isSundayOpen();
  const d = new Date(COOK.menuCargado + 'T00:00:00');
  const loaded = `lun ${d.getDate()}/${d.getMonth() + 1}`;
  const html = isOpen
    ? `<div class="status-banner open" style="margin:16px var(--pad) 0">
        <div class="status-dot"></div>
        <div class="status-txt"><strong>Menú abierto para edición</strong> — cierra hoy a las 23:59</div>
       </div>`
    : `<div class="status-banner confirmed" style="margin:16px var(--pad) 0">
        <div class="status-dot"></div>
        <div class="status-txt"><strong>Menú confirmado</strong> — semana del ${loaded} · solo puede variar el acompañamiento</div>
       </div>`;
  document.getElementById('status-banner-wrap').innerHTML = html;
  document.getElementById('desk-status-wrap').innerHTML = html;
}

function renderWeekNav() {
  const dates = getWeekDates();
  document.getElementById('week-range').textContent =
    formatShortDate(dates[0]) + ' – ' + formatShortDate(dates[4]);
}

function renderDayTabs() {
  const dates = getWeekDates();
  const todayIdx = new Date().getDay() - 1;
  document.getElementById('day-tabs').innerHTML = COOK.menu.map((item, i) => {
    const d = dates[i];
    const isOn = i === selDay, isToday = i === todayIdx;
    return `<div class="day-tab ${isOn ? 'on' : ''} ${isToday && !isOn ? 'today' : ''}" onclick="selectDay(${i})">
      <span class="day-tab-name">${item.day}</span>
      <span class="day-tab-num">${d.getDate()}</span>
    </div>`;
  }).join('');
}

function selectDay(i) { selDay = i; renderDayTabs(); renderDish(); }

// ── DISH RENDERING ─────────────────────────────────────────────────
function renderDish() {
  if (isDesk()) renderDishGrid();
  else renderDishSingle();
}

function renderDishSingle() {
  const item = COOK.menu[selDay];
  const q = qof(item.id);
  const isOpen = isSundayOpen();
  document.getElementById('dish-view').innerHTML = `
    <div class="dish-card">
      <div class="dish-top">
        <div class="dish-icon">${item.icon}</div>
        <div class="dish-info">
          <div class="dish-nm">${item.nm}</div>
          <div class="dish-price">${f(item.price)}</div>
        </div>
      </div>
      <div class="acomp-block">
        <div class="acomp-label">
          <span>Acompañamiento</span>
          <span class="lock-icon">${isOpen ? '✏️' : '🔒'}</span>
        </div>
        <div class="acomp-val">${item.acomp}</div>
      </div>
      <div class="add-row">
        <span class="add-note">Entrega: ${item.day.toLowerCase()}</span>
        <div class="qty-row">
          ${q ? `<button class="qb" onclick="chg('${item.id}',-1)">−</button><span class="qn">${q}</span>` : ''}
          <button class="qb add" onclick="chg('${item.id}',1)">+</button>
        </div>
      </div>
    </div>`;
}

function renderDishGrid() {
  document.getElementById('dish-view').innerHTML = COOK.menu.map(item => {
    const q = qof(item.id);
    return `<div class="dish-card dk-card">
      <div class="dish-icon">${item.icon}</div>
      <div class="dk-body">
        <span class="dk-day">${item.day}</span>
        <div class="dish-nm">${item.nm}</div>
        <div class="dish-price">${f(item.price)}</div>
        <div class="dk-acomp">${item.acomp}</div>
        <div class="dk-actions">
          ${q ? `<button class="qb" onclick="chg('${item.id}',-1)">−</button><span class="qn">${q}</span>` : ''}
          <button class="qb add" onclick="chg('${item.id}',1)">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── PLANS ────────────────────────────────────────────────────────
function renderPlans() {
  if (!COOK.plans.length) {
    document.getElementById('plans-list').innerHTML = `
      <div style="text-align:center;padding:52px 0;color:#B39480;font-size:13px">Sin planes disponibles.</div>`;
    return;
  }
  document.getElementById('plans-list').innerHTML = COOK.plans.map(p => `
    <div class="plan-card ${p.pop ? 'pop' : ''}">
      ${p.pop ? '<div class="plan-badge">Más popular</div>' : ''}
      <div class="plan-nm">${p.nm}</div>
      <div class="plan-desc">${p.desc}</div>
      <div class="plan-pr-row">
        <span class="plan-pr">${f(p.price)}</span>
        <span class="plan-save">Ahorrás ${f(p.saves)}</span>
      </div>
      <button class="plan-btn" onclick="addPlan('${p.id}')">Agregar este plan</button>
    </div>`).join('');
}

// ── CARRITO ───────────────────────────────────────────────────────
function chg(id, d) {
  const it = COOK.menu.find(i => i.id == id), ex = cart.find(i => i.id == id);
  if (ex) { ex.qty = Math.max(0, ex.qty + d); if (!ex.qty) cart = cart.filter(i => i.id != id); }
  else if (d > 0) cart.push({ ...it, qty: 1 });
  renderDish(); updateBar();
}

function addPlan(pid) {
  const p = COOK.plans.find(x => x.id == pid);
  if (!cart.find(i => i.id == pid)) cart.push({ id: pid, nm: p.nm, price: p.price, qty: 1, isPlan: true });
  updateBar();
  if (!isDesk()) openCart();
}

function rm(id) { cart = cart.filter(i => i.id != id); renderCart(); updateBar(); }

function updateBar() {
  const bar = document.getElementById('bar'), n = cnt(), desk = isDesk();
  bar.style.opacity = !desk && n ? '1' : '0';
  bar.style.pointerEvents = !desk && n ? 'auto' : 'none';
  document.getElementById('bar-amt').textContent = f(tot()) + ` (${n} item${n !== 1 ? 's' : ''})`;
  if (!desk && n) { bar.classList.remove('bounce'); void bar.offsetWidth; bar.classList.add('bounce'); }

  const badge = document.getElementById('desk-cart-badge');
  if (badge) { badge.style.display = n ? 'inline' : 'none'; badge.textContent = n; }

  renderCart();
}

function openCart() {
  renderCart();
  if (!isDesk()) document.getElementById('overlay').classList.add('open');
}
function closeCart() { document.getElementById('overlay').classList.remove('open'); }
function maybeClose(e) { if (e.target === document.getElementById('overlay')) closeCart(); }

function renderCart() {
  const mItems = document.getElementById('c-items');
  const mFoot  = document.getElementById('c-foot');
  const dItems = document.getElementById('desk-c-items');
  const dFoot  = document.getElementById('desk-c-foot');

  if (!cart.length) {
    const empty = `<div class="empty">
      <div class="empty-icon">🍱</div>
      <div class="empty-ttl">Tu pedido está vacío</div>
      <div class="empty-sub">Agregá platos para comenzar</div>
    </div>`;
    if (mItems) mItems.innerHTML = empty;
    if (dItems) dItems.innerHTML = empty;
    if (mFoot)  mFoot.innerHTML = '';
    if (dFoot)  dFoot.innerHTML = '';
    return;
  }

  const itemsHtml = cart.map(i => `
    <div class="c-item">
      <div class="c-info">
        <div class="c-nm">${i.nm}</div>
        <div class="c-sub">${i.isPlan ? 'Plan' : 'Vianda'} · x${i.qty}</div>
      </div>
      <div class="c-pr">${f(i.price * i.qty)}</div>
      <button class="rm" onclick="rm('${i.id}')">×</button>
    </div>`).join('');

  if (mItems) mItems.innerHTML = itemsHtml;
  if (dItems) dItems.innerHTML = itemsHtml;

  const t = tot(), env = 2500;
  const msg = encodeURIComponent(
    `¡Hola ${COOK.nm}! Quiero hacer un pedido:\n\n` +
    cart.map(i => `• ${i.nm} x${i.qty} — ${f(i.price * i.qty)}`).join('\n') +
    `\n\nTotal: ${f(t + env)} (incluye envío)\n\n¡Gracias!`
  );
  const footHtml = `
    <div class="sum-row"><span>Subtotal</span><span>${f(t)}</span></div>
    <div class="sum-row"><span>Envío estimado</span><span>${f(env)}</span></div>
    <div class="sum-row total"><span>Total</span><span>${f(t + env)}</span></div>
    <button class="wa-btn" onclick="window.open('https://wa.me/${COOK.phone}?text=${msg}','_blank')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Pedir por WhatsApp
    </button>`;

  if (mFoot) mFoot.innerHTML = footHtml;
  if (dFoot) dFoot.innerHTML = footHtml;
}

function doTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) =>
    el.classList.toggle('on', (i === 0 && t === 'menu') || (i === 1 && t === 'planes')));
  document.getElementById('pane-menu').classList.toggle('on', t === 'menu');
  document.getElementById('pane-planes').classList.toggle('on', t === 'planes');
}

// Re-render on resize crossing breakpoint
let wasDesk = window.innerWidth >= 768;
window.addEventListener('resize', () => {
  const now = window.innerWidth >= 768;
  if (now !== wasDesk) { wasDesk = now; if (COOK && COOK.menu.length) renderDish(); updateBar(); }
});

document.addEventListener('DOMContentLoaded', loadAndRender);
</script>
</body>
</html>

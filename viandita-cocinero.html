<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFF8F0">
<title>Viandita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
button,input{font-family:inherit;font-size:100%;-webkit-appearance:none;appearance:none}
:root{
  --bg:#FFF8F0;--surface:#fff;
  --p:#D4552A;--p-lt:#FAF0EA;
  --tx:#2D1B0E;--tx2:#7A5C46;--tx3:#B39480;
  --bd:#EDE0D4;--green:#4A7C3A;--green-bg:#EBF4E6;
  --amber:#A06B10;--amber-bg:#FEF3DC;
  --fd:'Fraunces',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --touch:48px;
  --xs:clamp(11px,3vw,13px);--sm:clamp(12px,3.5vw,14px);
  --base:clamp(14px,4vw,16px);--lg:clamp(16px,4.5vw,20px);
  --xl:clamp(20px,5.5vw,26px);--pad:clamp(16px,5vw,24px);
}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);max-width:500px;margin:0 auto;min-height:100dvh;padding-bottom:calc(80px + var(--sab));overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* COVER */
.cover{height:clamp(140px,38vw,200px);background:linear-gradient(135deg,#F5E6DC,#EDD5C0);position:relative}
.cover-pattern{position:absolute;inset:0;opacity:.07;background-image:radial-gradient(circle,#D4552A 1.5px,transparent 1.5px);background-size:clamp(16px,4.5vw,22px) clamp(16px,4.5vw,22px)}
.cover-logo{position:absolute;top:calc(14px + var(--sat));right:18px;font-family:var(--fd);font-size:var(--xs);color:var(--p);opacity:.7;font-style:italic}

/* PROFILE */
.profile{padding:0 var(--pad) 20px;background:var(--surface);border-bottom:1px solid var(--bd)}
.av-wrap{display:flex;align-items:flex-end;gap:18px;margin-top:-42px;margin-bottom:16px}
.av{width:clamp(68px,17vw,84px);height:clamp(68px,17vw,84px);border-radius:50%;background:var(--p);color:#fff;font-family:var(--fd);font-size:clamp(22px,5.5vw,32px);font-weight:600;display:flex;align-items:center;justify-content:center;border:4px solid var(--surface);flex-shrink:0;position:relative;z-index:10}
.av-name{font-family:var(--fd);font-size:var(--lg);font-weight:600;line-height:1.1}
.av-sp{font-size:var(--sm);color:var(--tx2);margin-top:5px}
.bio{font-size:var(--sm);color:var(--tx2);line-height:1.65;margin-bottom:14px}
.info-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:var(--xs);padding:6px 12px;border-radius:20px;border:1px solid var(--bd);color:var(--tx2);min-height:var(--touch);display:flex;align-items:center}

/* STATUS BANNER */
.status-banner{margin:16px var(--pad) 0;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px}
.status-banner.confirmed{background:var(--green-bg);border:1px solid #C3DDB8}
.status-banner.open{background:var(--amber-bg);border:1px solid #F5D78A}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.confirmed .status-dot{background:var(--green);animation:pulse 2.5s infinite}
.open .status-dot{background:var(--amber);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.status-txt{font-size:var(--xs);line-height:1.45}
.confirmed .status-txt{color:var(--green)}
.open .status-txt{color:var(--amber)}
.status-txt strong{font-weight:600}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:14px var(--pad) 4px}
.week-label{font-size:var(--xs);font-weight:600;letter-spacing:1.1px;text-transform:uppercase;color:var(--tx3)}
.week-range{font-size:var(--xs);color:var(--tx3)}

/* DAY TABS */
.day-tabs{display:flex;gap:6px;padding:8px var(--pad) 0;overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;border-radius:12px;border:1px solid var(--bd);background:var(--surface);cursor:pointer;transition:background .15s,border-color .15s;min-width:52px}
.day-tab.on{background:var(--p);border-color:var(--p)}
.day-tab.today{border-color:var(--p)}
.day-tab-name{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--tx3)}
.day-tab.on .day-tab-name{color:rgba(255,255,255,.8)}
.day-tab.today:not(.on) .day-tab-name{color:var(--p)}
.day-tab-num{font-size:var(--base);font-weight:600;color:var(--tx)}
.day-tab.on .day-tab-num{color:#fff}
.day-tab.today:not(.on) .day-tab-num{color:var(--p)}

/* TABS MAIN */
.tabs{display:flex;border-bottom:1px solid var(--bd);padding:0 var(--pad);background:var(--surface);position:sticky;top:0;z-index:50;margin-top:12px}
.tab{padding:15px 0;margin-right:28px;font-size:var(--sm);font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;min-height:var(--touch);display:flex;align-items:center}
.tab.on{color:var(--p);border-bottom-color:var(--p)}

.pane{display:none;padding:20px var(--pad)}
.pane.on{display:block}

/* DISH CARD */
.dish-card{background:var(--surface);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:0}
.dish-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.dish-icon{width:clamp(52px,14vw,64px);height:clamp(52px,14vw,64px);border-radius:14px;background:var(--p-lt);display:flex;align-items:center;justify-content:center;font-size:clamp(24px,6vw,30px);flex-shrink:0}
.dish-info{flex:1;min-width:0}
.dish-nm{font-family:var(--fd);font-size:var(--lg);font-weight:600;margin-bottom:4px;line-height:1.2}
.dish-price{font-size:var(--xl);font-weight:600;color:var(--p);font-family:var(--fd)}

/* ACOMPAÑAMIENTO */
.acomp-block{background:var(--bg);border-radius:12px;padding:12px 14px}
.acomp-label{font-size:var(--xs);font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.lock-icon{font-size:10px}
.acomp-val{font-size:var(--sm);color:var(--tx2);line-height:1.4}

/* ADD TO CART */
.add-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.add-note{font-size:var(--xs);color:var(--tx3)}
.qty-row{display:flex;align-items:center;gap:10px}
.qb{width:var(--touch);height:var(--touch);border-radius:50%;border:1px solid var(--bd);background:var(--surface);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx)}
.qb.add{background:var(--p);border-color:var(--p);color:#fff}
.qn{font-size:var(--base);font-weight:600;min-width:20px;text-align:center}

/* PLANS */
.plan-card{background:var(--surface);border:1.5px solid var(--bd);border-radius:16px;padding:18px;margin-bottom:14px;position:relative}
.plan-card.pop{border-color:var(--p)}
.plan-badge{position:absolute;top:-11px;left:16px;background:var(--p);color:#fff;font-size:var(--xs);font-weight:600;padding:3px 12px;border-radius:20px}
.plan-nm{font-weight:600;font-size:var(--base);margin-bottom:4px}
.plan-desc{font-size:var(--sm);color:var(--tx2);margin-bottom:12px;line-height:1.4}
.plan-pr-row{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.plan-pr{font-family:var(--fd);font-size:var(--xl);font-weight:600}
.plan-save{font-size:var(--xs);color:var(--green);font-weight:500;background:var(--green-bg);padding:4px 10px;border-radius:20px}
.plan-btn{width:100%;padding:14px;background:var(--p-lt);color:var(--p);border:none;border-radius:12px;font-family:var(--fb);font-size:var(--sm);font-weight:600;cursor:pointer;min-height:var(--touch)}
.plan-card.pop .plan-btn{background:var(--p);color:#fff}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--surface);border-top:1px solid var(--bd);padding:12px var(--pad) calc(12px + var(--sab));display:flex;align-items:center;gap:12px;z-index:200;transition:opacity .2s}
.bt-lbl{font-size:var(--xs);color:var(--tx3)}
.bt-amt{font-family:var(--fd);font-size:var(--lg);font-weight:600}
.bt-btn{background:var(--p);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-family:var(--fb);font-size:var(--sm);font-weight:600;cursor:pointer;white-space:nowrap;min-height:var(--touch)}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(45,27,14,.55);z-index:300;display:none;align-items:flex-end;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.cart-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-width:500px;margin:0 auto;max-height:88dvh;display:flex;flex-direction:column;padding-bottom:var(--sab)}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px var(--pad) 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sheet-hdr h3{font-family:var(--fd);font-size:var(--lg);font-weight:600}
.close-btn{width:var(--touch);height:var(--touch);border-radius:50%;border:1px solid var(--bd);background:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2)}
.sheet-scroll{overflow-y:auto;padding:0 var(--pad);flex:1;-webkit-overflow-scrolling:touch}
.c-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--bd)}
.c-info{flex:1;min-width:0}
.c-nm{font-weight:500;font-size:var(--sm)}
.c-sub{font-size:var(--xs);color:var(--tx2)}
.c-pr{font-weight:600;font-size:var(--sm);white-space:nowrap}
.rm{width:var(--touch);height:var(--touch);border-radius:50%;border:1px solid var(--bd);background:none;color:var(--tx3);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sum-row{display:flex;justify-content:space-between;font-size:var(--sm);padding:7px 0;color:var(--tx2)}
.sum-row.total{color:var(--tx);font-weight:600;font-size:var(--base);border-top:1px solid var(--bd);margin-top:6px;padding-top:13px}
.sheet-foot{padding:16px var(--pad) 20px;border-top:1px solid var(--bd);flex-shrink:0}
.wa-btn{width:100%;background:#25D366;color:#fff;border:none;border-radius:14px;padding:16px;font-family:var(--fb);font-size:var(--base);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;min-height:var(--touch);margin-top:16px}
.empty{text-align:center;padding:48px 0;color:var(--tx3)}
.powered{text-align:center;padding:20px 0 10px;font-size:var(--xs);color:var(--tx3)}
.powered span{font-family:var(--fd);font-style:italic;color:var(--p)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
</head>
<body>

<div class="cover">
  <div class="cover-pattern"></div>
  <div class="cover-logo">viandita</div>
</div>

<div class="profile">
  <div class="av-wrap">
    <div class="av" id="av"></div>
    <div>
      <div class="av-name" id="cook-nm"></div>
      <div class="av-sp" id="cook-sp"></div>
    </div>
  </div>
  <p class="bio" id="cook-bio"></p>
  <div class="info-row" id="cook-chips"></div>
</div>

<div id="status-banner-wrap"></div>

<div class="week-nav">
  <span class="week-label">Menú semanal</span>
  <span class="week-range" id="week-range"></span>
</div>

<div class="day-tabs" id="day-tabs"></div>

<div class="tabs">
  <div class="tab on" onclick="doTab('menu')">Plato del día</div>
  <div class="tab" onclick="doTab('planes')">Planes</div>
</div>

<div class="pane on" id="pane-menu"><div id="dish-view"></div></div>
<div class="pane" id="pane-planes"><div id="plans-list"></div></div>

<div class="powered">con <span>viandita</span></div>

<div class="bottom-bar" id="bar" style="opacity:0;pointer-events:none">
  <div style="flex:1">
    <div class="bt-lbl">Tu pedido</div>
    <div class="bt-amt" id="bar-amt"></div>
  </div>
  <button class="bt-btn" onclick="openCart()">Ver pedido →</button>
</div>

<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="cart-sheet">
    <div class="sheet-hdr">
      <h3>Tu pedido</h3>
      <button class="close-btn" onclick="closeCart()">×</button>
    </div>
    <div class="sheet-scroll" id="c-items"></div>
    <div class="sheet-foot" id="c-foot"></div>
  </div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── ESTADO ────────────────────────────────────────────────────────
let COOK = null, cart = [], selDay = 0;
const f = n => '$' + n.toLocaleString('es-AR');
const tot = () => cart.reduce((s, i) => s + i.price * i.qty, 0);
const cnt = () => cart.reduce((s, i) => s + i.qty, 0);
const qof = id => { const x = cart.find(i => i.id == id); return x ? x.qty : 0; };

// ── HELPERS DE FECHA ──────────────────────────────────────────────
function getMondayISO() {
  const now = new Date(), day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  // Usar getters locales para evitar que toISOString() desfase el día al convertir a UTC
  const y = mon.getFullYear();
  const m = String(mon.getMonth() + 1).padStart(2, '0');
  const d = String(mon.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function getWeekDates() {
  const now = new Date(), day = now.getDay();
  const diffToMon = day === 0 ? -6 : (1 - day);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diffToMon);
  mon.setHours(0, 0, 0, 0);
  return Array.from({ length: 5 }, (_, i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i); return d;
  });
}

function isSundayOpen() { return new Date().getDay() === 0; }
function formatShortDate(d) { return d.getDate() + '/' + (d.getMonth() + 1); }

// ── ESTADOS ESPECIALES ────────────────────────────────────────────
function showNotFound() {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;font-family:'DM Sans',system-ui,sans-serif;flex-direction:column;gap:16px;color:#7A5C46;padding:32px;text-align:center">
      <div style="font-size:48px">🍱</div>
      <div style="font-family:'Fraunces',Georgia,serif;font-size:24px;font-weight:600;color:#2D1B0E">Cocinero no encontrado</div>
      <div style="font-size:14px">No existe ningún cocinero con ese link. Verificá la dirección.</div>
      <a href="viandita-landing.html" style="margin-top:8px;color:#D4552A;font-size:14px;font-weight:600">← Volver al inicio</a>
    </div>`;
}

function showNoMenu() {
  document.getElementById('day-tabs').innerHTML = '';
  document.getElementById('dish-view').innerHTML = `
    <div style="text-align:center;padding:48px 0;color:#B39480">
      <div style="font-size:40px;margin-bottom:12px">📋</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">Sin menú esta semana</div>
      <div style="font-size:13px">El cocinero aún no cargó el menú de la semana.</div>
    </div>`;
}

// ── CARGA DESDE SUPABASE ──────────────────────────────────────────
async function loadAndRender() {
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) { showNotFound(); return; }

  const { data: cocinero, error } = await db
    .from('cocineros')
    .select('*')
    .eq('slug', slug)
    .eq('activo', true)
    .maybeSingle();

  if (error || !cocinero) { showNotFound(); return; }

  const monday = getMondayISO();

  const { data: semana } = await db
    .from('semanas')
    .select('id, semana_inicio')
    .eq('cocinero_id', cocinero.id)
    .eq('semana_inicio', monday)
    .maybeSingle();

  let menu = [];
  if (semana) {
    const { data: platos } = await db
      .from('platos')
      .select('*')
      .eq('semana_id', semana.id)
      .eq('activo', true)
      .order('orden');
    menu = (platos || []).map(p => ({
      id: p.id, day: p.dia, nm: p.nombre,
      acomp: p.acompanamiento, price: p.precio, icon: p.icono
    }));
  }

  const { data: planesRaw } = await db
    .from('planes')
    .select('*')
    .eq('cocinero_id', cocinero.id)
    .eq('activo', true)
    .order('precio');

  COOK = {
    nm: cocinero.nombre,
    init: cocinero.iniciales,
    sp: cocinero.especialidad,
    bio: cocinero.bio || '',
    zone: cocinero.zona,
    days: 'Lun–Vie',
    phone: cocinero.telefono,
    rating: cocinero.rating,
    rev: cocinero.reviews || 0,
    menuCargado: semana ? semana.semana_inicio : monday,
    menu,
    plans: (planesRaw || []).map(p => ({
      id: p.id, nm: p.nombre, desc: p.descripcion,
      price: p.precio, saves: p.ahorro, pop: !!p.destacado
    }))
  };

  init();
}

// ── INIT ──────────────────────────────────────────────────────────
function init() {
  document.title = COOK.nm + ' · Viandita';
  document.getElementById('av').textContent = COOK.init;
  document.getElementById('cook-nm').textContent = COOK.nm;
  document.getElementById('cook-sp').textContent = COOK.sp;
  document.getElementById('cook-bio').textContent = COOK.bio;
  document.getElementById('cook-chips').innerHTML = [
    `<span class="chip">📍 ${COOK.zone}</span>`,
    `<span class="chip">📅 ${COOK.days}</span>`,
    `<span class="chip">★ ${COOK.rating} (${COOK.rev})</span>`,
  ].join('');

  renderStatusBanner();
  renderWeekNav();

  if (!COOK.menu.length) {
    showNoMenu();
  } else {
    const today = new Date().getDay();
    if (today >= 1 && today <= 5) selDay = today - 1;
    renderDayTabs();
    renderDish();
  }

  renderPlans();
}

function renderStatusBanner() {
  const isOpen = isSundayOpen();
  const d = new Date(COOK.menuCargado + 'T00:00:00');
  const loaded = `lun ${d.getDate()}/${d.getMonth() + 1}`;
  const wrap = document.getElementById('status-banner-wrap');
  if (isOpen) {
    wrap.innerHTML = `<div class="status-banner open" style="margin:16px var(--pad) 0">
      <div class="status-dot"></div>
      <div class="status-txt"><strong>Menú abierto para edición</strong> — cierra hoy a las 23:59</div>
    </div>`;
  } else {
    wrap.innerHTML = `<div class="status-banner confirmed" style="margin:16px var(--pad) 0">
      <div class="status-dot"></div>
      <div class="status-txt"><strong>Menú confirmado</strong> — semana del ${loaded} · solo puede variar el acompañamiento</div>
    </div>`;
  }
}

function renderWeekNav() {
  const dates = getWeekDates();
  document.getElementById('week-range').textContent =
    formatShortDate(dates[0]) + ' – ' + formatShortDate(dates[4]);
}

function renderDayTabs() {
  const dates = getWeekDates();
  const todayIdx = new Date().getDay() - 1;
  document.getElementById('day-tabs').innerHTML = COOK.menu.map((item, i) => {
    const d = dates[i];
    const isOn = i === selDay, isToday = i === todayIdx;
    return `<div class="day-tab ${isOn ? 'on' : ''} ${isToday && !isOn ? 'today' : ''}" onclick="selectDay(${i})">
      <span class="day-tab-name">${item.day}</span>
      <span class="day-tab-num">${d.getDate()}</span>
    </div>`;
  }).join('');
}

function selectDay(i) { selDay = i; renderDayTabs(); renderDish(); }

function renderDish() {
  const item = COOK.menu[selDay];
  const q = qof(item.id);
  const isOpen = isSundayOpen();
  document.getElementById('dish-view').innerHTML = `
    <div class="dish-card">
      <div class="dish-top">
        <div class="dish-icon">${item.icon}</div>
        <div class="dish-info">
          <div class="dish-nm">${item.nm}</div>
          <div class="dish-price">${f(item.price)}</div>
        </div>
      </div>
      <div class="acomp-block">
        <div class="acomp-label">
          <span>Acompañamiento</span>
          <span class="lock-icon">${isOpen ? '✏️' : '🔒'}</span>
        </div>
        <div class="acomp-val">${item.acomp}</div>
      </div>
      <div class="add-row">
        <span class="add-note">Entrega: ${item.day.toLowerCase()}</span>
        <div class="qty-row">
          ${q ? `<button class="qb" onclick="chg('${item.id}',-1)">−</button><span class="qn">${q}</span>` : ''}
          <button class="qb add" onclick="chg('${item.id}',1)">+</button>
        </div>
      </div>
    </div>`;
}

function renderPlans() {
  if (!COOK.plans.length) {
    document.getElementById('plans-list').innerHTML = `
      <div style="text-align:center;padding:48px 0;color:#B39480;font-size:13px">Sin planes disponibles.</div>`;
    return;
  }
  document.getElementById('plans-list').innerHTML = COOK.plans.map(p => `
    <div class="plan-card ${p.pop ? 'pop' : ''}">
      ${p.pop ? '<div class="plan-badge">Más popular</div>' : ''}
      <div class="plan-nm">${p.nm}</div>
      <div class="plan-desc">${p.desc}</div>
      <div class="plan-pr-row">
        <span class="plan-pr">${f(p.price)}</span>
        <span class="plan-save">Ahorrás ${f(p.saves)}</span>
      </div>
      <button class="plan-btn" onclick="addPlan('${p.id}')">Agregar este plan</button>
    </div>`).join('');
}

// ── CARRITO ───────────────────────────────────────────────────────
function chg(id, d) {
  const it = COOK.menu.find(i => i.id == id), ex = cart.find(i => i.id == id);
  if (ex) { ex.qty = Math.max(0, ex.qty + d); if (!ex.qty) cart = cart.filter(i => i.id != id); }
  else if (d > 0) cart.push({ ...it, qty: 1 });
  renderDish(); updateBar();
}

function addPlan(pid) {
  const p = COOK.plans.find(x => x.id == pid);
  if (!cart.find(i => i.id == pid)) cart.push({ id: pid, nm: p.nm, price: p.price, qty: 1, isPlan: true });
  updateBar(); openCart();
}

function rm(id) { cart = cart.filter(i => i.id != id); renderCart(); updateBar(); }

function updateBar() {
  const bar = document.getElementById('bar'), n = cnt();
  bar.style.opacity = n ? '1' : '0';
  bar.style.pointerEvents = n ? 'auto' : 'none';
  document.getElementById('bar-amt').textContent = f(tot()) + ` (${n} item${n !== 1 ? 's' : ''})`;
}

function openCart() { renderCart(); document.getElementById('overlay').classList.add('open'); }
function closeCart() { document.getElementById('overlay').classList.remove('open'); }
function maybeClose(e) { if (e.target === document.getElementById('overlay')) closeCart(); }

function renderCart() {
  const items = document.getElementById('c-items'), foot = document.getElementById('c-foot');
  if (!cart.length) {
    items.innerHTML = `<div class="empty"><div style="font-size:42px;margin-bottom:10px">🍱</div>Tu pedido está vacío</div>`;
    foot.innerHTML = ''; return;
  }
  items.innerHTML = cart.map(i => `
    <div class="c-item">
      <div class="c-info">
        <div class="c-nm">${i.nm}</div>
        <div class="c-sub">${i.isPlan ? 'Plan' : 'Vianda'} · x${i.qty}</div>
      </div>
      <div class="c-pr">${f(i.price * i.qty)}</div>
      <button class="rm" onclick="rm('${i.id}')">×</button>
    </div>`).join('');
  const t = tot(), env = 2500;
  const msg = encodeURIComponent(`¡Hola ${COOK.nm}! Quiero hacer un pedido:\n\n` +
    cart.map(i => `• ${i.nm} x${i.qty} — ${f(i.price * i.qty)}`).join('\n') +
    `\n\nTotal: ${f(t + env)} (incluye envío)\n\n¡Gracias!`);
  foot.innerHTML = `
    <div class="sum-row"><span>Subtotal</span><span>${f(t)}</span></div>
    <div class="sum-row"><span>Envío estimado</span><span>${f(env)}</span></div>
    <div class="sum-row total"><span>Total</span><span>${f(t + env)}</span></div>
    <button class="wa-btn" onclick="window.open('https://wa.me/${COOK.phone}?text=${msg}','_blank')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Pedir por WhatsApp
    </button>`;
}

function doTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('on', (i === 0 && t === 'menu') || (i === 1 && t === 'planes')));
  document.getElementById('pane-menu').classList.toggle('on', t === 'menu');
  document.getElementById('pane-planes').classList.toggle('on', t === 'planes');
}

document.addEventListener('DOMContentLoaded', loadAndRender);
</script>
</body>
</html>
